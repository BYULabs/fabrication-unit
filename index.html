<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLCC v1.0 - Purpose-Less Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px #00ff41); }
            50% { filter: drop-shadow(0 0 15px #00ff41); }
        }
        .crt-overlay {
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 100;
        }
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 101;
        }
        .border-bevel {
            border-width: 4px;
            border-style: solid;
            border-top-color: rgba(255, 255, 255, 0.3);
            border-left-color: rgba(255, 255, 255, 0.3);
            border-bottom-color: rgba(0, 0, 0, 0.5);
            border-right-color: rgba(0, 0, 0, 0.5);
        }
        .border-bevel-active {
            border-top-color: rgba(0, 0, 0, 0.5);
            border-left-color: rgba(0, 0, 0, 0.5);
            border-bottom-color: rgba(255, 255, 255, 0.3);
            border-right-color: rgba(255, 255, 255, 0.3);
        }
        .stage-progress {
            background: conic-gradient(
                #00ff41 0% 65%,
                #2a2a2e 65% 100%
            );
        }
        .labyrinth-line {
            background: linear-gradient(to right, #00ff41, #00ff41) no-repeat;
            background-size: 100% 2px;
            background-position: center;
        }
        .stress-meter {
            background: linear-gradient(90deg, #00ff41 0%, #ffb000 50%, #ff0000 100%);
        }
        .toggle-switch-track {
            background: linear-gradient(180deg, #555 0%, #2a2a2e 50%, #111 100%);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-[#1a1a1b] font-mono relative">
    <!-- CRT Curve Overlay -->
    <div class="crt-overlay fixed inset-0"></div>
    
    <!-- Scanline Effect -->
    <div class="scanline fixed inset-0"></div>
    
    <!-- Main Grid Container -->
    <div class="h-full w-full grid grid-cols-12 grid-rows-10 gap-0">
        
        <!-- HEADER - Top 10% -->
        <header class="col-span-12 row-span-1 bg-[#2a2a2e] border-bevel border-b-4 border-neutral-700 flex items-center justify-between px-6">
            <div class="text-[#00ff41] text-2xl font-bold tracking-wider">
                PLCC v1.0
            </div>
            <div class="flex items-center gap-4">
                <div class="text-[#ffb000] text-sm">[SYSTEM TIME: 23:59:59]</div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                    <span class="text-red-400 font-bold tracking-widest">SYSTEM ARMED</span>
                </div>
            </div>
        </header>

        <!-- LEFT LOG PANEL - 25% width -->
        <section class="col-span-3 row-span-9 bg-[#1e1e20] border-bevel border-r-4 border-neutral-700 p-4 overflow-hidden">
            <div class="text-[#ffb000] text-lg font-bold mb-3 border-b border-neutral-600 pb-1">
                SYSTEM LOG
            </div>
            <div class="space-y-1 text-xs text-[#00ff41] font-mono h-full overflow-y-auto" id="systemLog">
                <!-- Log entries will be populated here -->
            </div>
        </section>

        <!-- CENTER CONSOLE - The Labyrinth -->
        <main class="col-span-6 row-span-9 bg-[#2a2a2e] border-bevel border-r-4 border-neutral-700 p-6 relative overflow-hidden">
            <div class="text-center mb-4">
                <div class="text-[#ffb000] text-xl font-bold tracking-wider">CENTRAL PROCESSING UNIT</div>
                <div class="text-[#00ff41] text-sm">COGNITIVE SYNCHRONIZATION MATRIX</div>
            </div>

            <!-- The Labyrinth Container -->
            <div class="h-5/6 flex items-center justify-center relative">
                
                <!-- Complex Interconnecting Lines -->
                <div class="absolute inset-0">
                    <!-- Main vertical line -->
                    <div class="absolute left-1/2 top-1/4 h-1/2 w-1 bg-[#00ff41]/50 transform -translate-x-1/2"></div>
                    
                    <!-- Horizontal connectors -->
                    <div class="absolute left-1/4 top-1/3 h-1 w-1/4 bg-[#00ff41]/50"></div>
                    <div class="absolute right-1/4 top-1/3 h-1 w-1/4 bg-[#00ff41]/50"></div>
                    
                    <!-- Diagonal lines -->
                    <div class="absolute left-1/3 top-2/3 h-1 w-1/3 bg-[#00ff41]/50 transform rotate-45 origin-left"></div>
                    <div class="absolute right-1/3 top-2/3 h-1 w-1/3 bg-[#00ff41]/50 transform -rotate-45 origin-right"></div>
                    
                    <!-- Circular node connectors -->
                    <div class="absolute left-1/4 top-2/3 w-1/2 h-1 bg-[#00ff41]/30"></div>
                </div>

                <!-- Stage Progress Indicator -->
                <div class="relative z-10">
                    <div class="stage-progress w-48 h-48 rounded-full relative">
                        <div class="absolute inset-4 bg-[#2a2a2e] rounded-full flex items-center justify-center">
                            <div class="text-center">
                                <div class="text-[#00ff41] text-3xl font-bold">65%</div>
                                <div class="text-[#ffb000] text-sm">STAGE COMPLETE</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Nodes around the circle -->
                    <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 w-8 h-8 bg-[#2a2a2e] border-2 border-[#00ff41] rounded-full"></div>
                    <div class="absolute top-1/4 -right-4 transform -translate-y-1/2 w-8 h-8 bg-[#2a2a2e] border-2 border-[#00ff41] rounded-full"></div>
                    <div class="absolute -bottom-4 left-1/2 transform -translate-x-1/2 w-8 h-8 bg-[#2a2a2e] border-2 border-[#00ff41] rounded-full"></div>
                    <div class="absolute top-1/4 -left-4 transform -translate-y-1/2 w-8 h-8 bg-[#2a2a2e] border-2 border-[#00ff41] rounded-full"></div>
                </div>

                <!-- Main Action Bubble Button -->
                <button id="mainAction" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 bubble-button animate-glow" style="animation: glow 2s infinite;">
                    <div class="bg-[#1a1a1b] text-[#00ff41] text-lg font-bold py-4 px-8 rounded-2xl border-bevel active:border-bevel-active transition-all duration-150 hover:brightness-110 text-center min-w-[200px]">
                        INITIATE<br/>COGNITIVE OVERRIDE
                    </div>
                </button>
            </div>

            <!-- Status indicators -->
            <div class="absolute bottom-4 left-4 flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-[#00ff41] rounded-full"></div>
                    <span class="text-[#00ff41] text-sm">ONLINE</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-[#ffb000] rounded-full animate-pulse"></div>
                    <span class="text-[#ffb000] text-sm">PROCESSING</span>
                </div>
            </div>
        </main>

        <!-- RIGHT DIAGNOSTIC PANEL - 20% width -->
        <aside class="col-span-3 row-span-9 bg-[#1e1e20] border-bevel p-6">
            <div class="text-[#ffb000] text-lg font-bold mb-6 border-b border-neutral-600 pb-2">
                DIAGNOSTICS
            </div>

            <!-- Stress Meter -->
            <div class="mb-8">
                <div class="text-[#00ff41] text-sm mb-2 flex justify-between">
                    <span>STRESS METER</span>
                    <span>80%</span>
                </div>
                <div class="h-8 bg-[#2a2a2e] border-2 border-neutral-700 relative overflow-hidden">
                    <div class="stress-meter h-full w-4/5 relative">
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-pulse"></div>
                    </div>
                    <div class="absolute right-1/5 top-0 bottom-0 w-1 bg-white/50"></div>
                </div>
                <div class="text-[#ffb000] text-xs mt-1 text-right">CRITICAL THRESHOLD</div>
            </div>

            <!-- Large Amber Toggle Switch -->
            <div class="mb-8">
                <div class="text-[#ffb000] text-sm mb-3">COGNITIVE BYPASS</div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" id="mainToggle">
                    <div class="toggle-switch-track w-24 h-12 rounded-full border-4 border-neutral-700 peer-checked:after:translate-x-12 after:content-[''] after:absolute after:top-1 after:left-1 after:bg-[#ffb000] after:rounded-full after:h-10 after:w-10 after:transition-all after:border-2 after:border-neutral-600"></div>
                </label>
                <div class="text-[#00ff41] text-xs mt-2 text-center">ENABLE/DISABLE</div>
            </div>

            <!-- Sub Controls -->
            <div class="space-y-4">
                <button class="bubble-button w-full">
                    <div class="bg-[#2a2a2e] text-[#00ff41] py-3 px-4 rounded-xl border-bevel active:border-bevel-active transition-all duration-150 text-sm">
                        FLUSH BUFFER CACHE
                    </div>
                </button>
                
                <button class="bubble-button w-full">
                    <div class="bg-[#2a2a2e] text-[#00ff41] py-3 px-4 rounded-xl border-bevel active:border-bevel-active transition-all duration-150 text-sm">
                        REINITIALIZE SEQUENCE
                    </div>
                </button>
                
                <button class="bubble-button w-full">
                    <div class="bg-[#2a2a2e] text-[#ffb000] py-3 px-4 rounded-xl border-bevel active:border-bevel-active transition-all duration-150 text-sm font-bold">
                        EMERGENCY PURGE
                    </div>
                </button>
            </div>

            <!-- System Status -->
            <div class="mt-8 pt-4 border-t border-neutral-700">
                <div class="text-[#00ff41] text-sm mb-2">SYSTEM STATUS</div>
                <div class="space-y-1 text-xs">
                    <div class="flex justify-between">
                        <span class="text-[#00ff41]">CPU LOAD</span>
                        <span class="text-[#ffb000]">87%</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-[#00ff41]">MEMORY</span>
                        <span class="text-[#ffb000]">92%</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-[#00ff41]">TEMPERATURE</span>
                        <span class="text-[#ffb000]">64°C</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // System log entries
        const systemLogs = [
            "BOOT SEQUENCE INITIATED...",
            "COGNITIVE SYNC: 98%",
            "NEURAL PATHWAYS: ACTIVE",
            "BUFFER ALLOCATION: 2048MB",
            "CRYPTOGRAPHIC SEED: GENERATED",
            "PARALLEL PROCESSES: 16 THREADS",
            "MEMORY FRAGMENTATION: 12%",
            "THERMAL THRESHOLD: NORMAL",
            "I/O THROUGHPUT: 4.2GB/s",
            "SECURITY LAYER: ARMED",
            "DATA INTEGRITY: VERIFIED",
            "BACKUP ROUTINES: STANDBY",
            "NETWORK LATENCY: 24ms",
            "POWER DRAW: 87% CAPACITY",
            "COOLANT FLOW: OPTIMAL",
            "LOGICAL GATES: 100% OPERATIONAL",
            "ERROR CORRECTION: ACTIVE",
            "SYNCHRONIZATION: COMPLETE",
            "STANDBY MODE: DISABLED",
            "FINAL CHECK: ALL SYSTEMS NOMINAL"
        ];

        // Populate system log
        const logContainer = document.getElementById('systemLog');
        systemLogs.forEach(log => {
            const logEntry = document.createElement('div');
            logEntry.className = 'font-mono';
            logEntry.textContent = `> ${log}`;
            logContainer.appendChild(logEntry);
        });

        // Bubble button interaction
        document.querySelectorAll('.bubble-button').forEach(button => {
            button.addEventListener('mousedown', function() {
                this.querySelector('div').classList.add('border-bevel-active');
                this.querySelector('div').classList.remove('border-bevel');
            });
            
            button.addEventListener('mouseup', function() {
                this.querySelector('div').classList.remove('border-bevel-active');
                this.querySelector('div').classList.add('border-bevel');
                
                // Add a new log entry
                const newLog = document.createElement('div');
                newLog.className = 'font-mono text-[#00ff41]';
                newLog.textContent = `> USER INPUT DETECTED: ${new Date().toLocaleTimeString()}`;
                logContainer.appendChild(newLog);
                logContainer.scrollTop = logContainer.scrollHeight;
            });
            
            button.addEventListener('mouseleave', function() {
                this.querySelector('div').classList.remove('border-bevel-active');
                this.querySelector('div').classList.add('border-bevel');
            });
        });

        // Main action button
        document.getElementById('mainAction').addEventListener('click', function() {
            const logs = [
                "COGNITIVE OVERRIDE INITIATED",
                "NEURAL RE-ROUTING IN PROGRESS...",
                "WARNING: CRITICAL SYSTEMS ENGAGED",
                "OVERRIDE SEQUENCE: 25% COMPLETE",
                "SYSTEM STRESS: INCREASING",
                "OVERRIDE SEQUENCE: 50% COMPLETE",
                "THERMAL LEVELS: ELEVATED",
                "OVERRIDE SEQUENCE: 75% COMPLETE",
                "FINALIZING COGNITIVE REALIGNMENT",
                "OVERRIDE SEQUENCE: 100% COMPLETE",
                "COGNITIVE OVERRIDE SUCCESSFUL"
            ];
            
            logs.forEach((log, index) => {
                setTimeout(() => {
                    const newLog = document.createElement('div');
                    newLog.className = 'font-mono text-[#00ff41]';
                    newLog.textContent = `> ${log}`;
                    logContainer.appendChild(newLog);
                    logContainer.scrollTop = logContainer.scrollHeight;
                }, index * 300);
            });
            
            // Pulse the SYSTEM ARMED indicator
            const armedIndicator = document.querySelector('.text-red-400');
            armedIndicator.classList.add('animate-pulse');
            setTimeout(() => armedIndicator.classList.remove('animate-pulse'), 3000);
        });

        // Toggle switch
        document.getElementById('mainToggle').addEventListener('change', function() {
            const status = this.checked ? "ENABLED" : "DISABLED";
            const newLog = document.createElement('div');
            newLog.className = 'font-mono text-[#00ff41]';
            newLog.textContent = `> COGNITIVE BYPASS: ${status}`;
            logContainer.appendChild(newLog);
            logContainer.scrollTop = logContainer.scrollHeight;
        });

        // Update system time every second
        function updateSystemTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.querySelector('[class*="SYSTEM TIME"]').textContent = `[SYSTEM TIME: ${timeString}]`;
        }
        setInterval(updateSystemTime, 1000);
        updateSystemTime();
    </script>
</body>
</html>
